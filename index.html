<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạp Hóa Thanh Trúc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast"></div>

<div id="history-overlay">
    <div id="history-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #444;">
        <h2 style="margin: 0;">📜 Lịch Sử</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="clear-history" onclick="clearHistory()" style="background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;">
                Xóa tất cả
            </button>
            <span onclick="toggleHistory()" style="cursor:pointer; font-size: 20px;">❌</span>
        </div>
    </div>
    <div id="history-content" style="flex: 1; overflow-y: auto; padding: 10px;"></div>
</div>

<div id="sidebar">
    <h2>Danh Mục</h2>
    <ul id="categories"></ul>
</div>

<div id="main-container">
    <div id="top-bar">
        <span id="menu-btn">☰</span>
        <h2>Danh Sách Sản Phẩm</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div id="note-icon" onclick="toggleNote()" style="background: #3498db; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">
                📝 Ghi chú
            </div>
            <div id="cart-icon" onclick="toggleCart()">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </div>

    <input type="text" id="search-box" placeholder="Nhập chữ cái đầu...">
    <div id="current-time"></div>

    <div id="product-container" class="product-container"></div>
</div>

<div id="cart-overlay">
    <div id="cart-header">
        <h2>🛒 Giỏ Hàng <span id="cart-total-count">(0)</span></h2>
        <button id="clear-all-btn" onclick="clearAllCart()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: auto; margin-right: 15px;">
            🗑 Xóa tất cả
        </button>
        <span onclick="toggleCart()" style="cursor:pointer">❌</span>
    </div>
    <table>
        <thead>
        <tr>
            <th>SL</th>
            <th>Sản phẩm</th>
            <th>Xóa</th>
        </tr>
        </thead>
        <tbody id="selected-list"></tbody>
    </table>
    <button id="copyBtn" onclick="copyList()">📋 Sao chép</button>
</div>

<div id="note-overlay" class="overlay-common">
    <div class="overlay-header">
        <h2>📝 Kiểm Hàng</h2>
        <button id="clear-all-note" onclick="clearAllNote()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: auto; margin-right: 15px;">
            🗑 Xóa tất cả
        </button>
        <span onclick="toggleNote()" style="cursor:pointer">❌</span>
    </div>
    <div style="padding: 15px;">
        <textarea id="note-input" placeholder="Dán danh sách đã copy vào đây..." style="width: 100%; height: 100px; border-radius: 8px; padding: 10px; background: #1e293b; color: white; border: 1px solid #3498db; width: 100%; box-sizing: border-box;"></textarea>
        <button onclick="processNote()" style="width: 100%; margin-top: 10px; padding: 12px; background: #3498db; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer;">
            📥 Nhập danh sách kiểm hàng
        </button>
    </div>
    <div id="note-items-container" style="flex: 1; overflow-y: auto; padding: 0 15px;"></div>
    <div style="padding: 15px; border-top: 1px solid #444; display: flex; gap: 10px;">
        <button onclick="toggleTrash()" style="flex: 1; padding: 10px; background: #95a5a6; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer;">
            🗑 Thùng rác (<span id="trash-count">0</span>)
        </button>
    </div>
</div>

<div id="trash-overlay" class="overlay-common">
    <div class="overlay-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h2>🗑 Thùng Rác</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="clearAllTrash()" style="background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;">
                Xóa tất cả
            </button>
            <span onclick="toggleTrash()" style="cursor:pointer; font-size: 20px;">❌</span>
        </div>
    </div>
    <div id="trash-items-container" style="flex: 1; overflow-y: auto; padding: 15px;"></div>
</div>

<div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-box">
        <p id="confirm-message"></p>
        <div class="confirm-buttons">
            <button id="confirm-yes">Đồng ý</button>
            <button id="confirm-no">Hủy</button>
        </div>
    </div>
</div>
<div id="image-zoom-overlay" onclick="this.style.display='none'">
    <img id="zoomed-image" src="" alt="Zoomed Product">
</div>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
